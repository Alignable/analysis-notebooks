name: Check notebooks
on:
  pull_request:
    paths:
      - "**/*.ipynb"
  push:
    branches: [main]
    paths:
      - "**/*.ipynb"
  workflow_dispatch:

jobs:
  check-notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: kynan/nbstripout@main
        with:
          paths: '**/*.ipynb'
