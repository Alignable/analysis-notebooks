repos:
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
  - repo: local
    hooks:
      - id: check-notebook-filename
        name: Check notebook filename format (YYYY-MM-DD_description.ipynb)
        entry: bin/check-notebook-filename.sh
        language: system
        files: '^notebooks/.+\.ipynb$'
        exclude: '\.ipynb_checkpoints/'
